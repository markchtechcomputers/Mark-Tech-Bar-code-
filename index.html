<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark Tech Barcode Generator</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
}

/* MATRIX */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* NAV */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 15px;
}

.tech-btn {
    background: #00ff99;
    padding: 8px 15px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

/* MAIN */
.wrapper {
    display: flex;
    justify-content: center;
    padding: 40px 15px;
}

.container {
    width: 100%;
    max-width: 420px;
    background: rgba(0,0,0,0.75);
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,255,0,0.3);
}

h1 { color: #00ff99; }

input, select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin: 10px 0;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #00ff99;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
}

svg {
    margin-top: 20px;
    background: white;
    padding: 10px;
    border-radius: 10px;
    width: 100%;
}

/* FLOAT BUTTONS */
.float-left {
    position: fixed;
    left: 15px;
    bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.float-btn {
    background: #00ff99;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 12px;
    text-align: center;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    right: 15px;
    bottom: 20px;
    background: limegreen;
    padding: 12px;
    border-radius: 50%;
    box-shadow: 0 0 15px lime;
    cursor: pointer;
}

/* POPUP */
.popup {
    display: none;
    position: fixed;
    bottom: 80px;
    left: 15px;
    background: rgba(0,0,0,0.9);
    padding: 15px;
    border-radius: 10px;
}

/* PAGES */
.page {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="topbar">
    <h3>⚡ Mark Tech</h3>
    <div class="tech-btn" onclick="goTech()">TECH IT</div>
</div>

<!-- MAIN PAGE -->
<div id="mainPage" class="active">
<div class="wrapper">
<div class="container">

<h1>Barcode Generator</h1>

<input type="text" id="text" placeholder="Enter text">
<select id="format">
<option value="CODE128">CODE128</option>
<option value="EAN13">EAN-13</option>
</select>

<button onclick="generateBarcode()">Generate</button>
<button onclick="downloadPNG()">Download</button>

<svg id="barcode"></svg>

</div>
</div>
</div>

<!-- DONATION PAGE -->
<div id="donatePage" class="page">
<h2>💰 Support Mark Tech</h2>

<p><b>KCB BANK</b><br>
Paybill: 522522<br>
Account: 1336980125</p>

<p><b>FAMILY BANK</b><br>
Paybill: 222111<br>
Account: 085000113030</p>

<button onclick="goHome()">Back</button>
</div>

<!-- FLOAT BUTTONS -->
<div class="float-left">
    <div class="float-btn" onclick="openDonate()">Donate</div>
    <div class="float-btn" onclick="toggleContact()">Contact</div>
</div>

<!-- CONTACT POPUP -->
<div id="contactBox" class="popup">
    <p>📞 Call: +254724356178</p>
    <p>💬 WhatsApp: 0724356178</p>
    <p>📧 Email: marklinochieng@gmail.com</p>
</div>

<!-- WHATSAPP -->
<div class="whatsapp" onclick="openWhatsApp()">💬</div>

<script>
// NAVIGATION
function openDonate() {
    document.getElementById("mainPage").classList.remove("active");
    document.getElementById("donatePage").classList.add("active");
}

function goHome() {
    document.getElementById("donatePage").classList.remove("active");
    document.getElementById("mainPage").classList.add("active");
}

// CONTACT
function toggleContact() {
    let box = document.getElementById("contactBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

// WHATSAPP
function openWhatsApp() {
    window.open("https://wa.me/254724356178");
}

// TECH SITE
function goTech() {
    window.open("https://manlung-tech-city.vercel.app/");
}

// BARCODE
function generateBarcode() {
    let value = document.getElementById("text").value;
    let format = document.getElementById("format").value;

    if (!value) return alert("Enter value");

    JsBarcode("#barcode", value, {
        format: format,
        displayValue: true
    });
}

// DOWNLOAD
function downloadPNG() {
    let svg = document.getElementById("barcode");
    let data = new XMLSerializer().serializeToString(svg);
    let canvas = document.createElement("canvas");
    let ctx = canvas.getContext("2d");
    let img = new Image();

    img.onload = function () {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);

        let link = document.createElement("a");
        link.download = "barcode.png";
        link.href = canvas.toDataURL();
        link.click();
    };

    img.src = "data:image/svg+xml;base64," + btoa(data);
}

// MATRIX
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "010101";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff99";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        let text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height) drops[i] = 0;
        drops[i]++;
    }
}

setInterval(draw, 35);
</script>

</body>
</html>
