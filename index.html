<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARK TECH</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* TITLE */
.title {
    text-align: center;
    font-size: 40px;
    font-weight: bold;
    margin-top: 20px;
    color: red;
    text-shadow: 0 0 10px red, 0 0 20px red;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px red; }
    to { text-shadow: 0 0 30px red; }
}

/* BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* CONTAINER */
.container {
    max-width: 400px;
    margin: 40px auto;
    background: rgba(0,0,0,0.8);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

/* BUTTONS */
button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: none;
    border-radius: 8px;
    background: lime;
    cursor: pointer;
    font-weight: bold;
}

/* BARCODE */
svg {
    margin-top: 15px;
    background: white;
    padding: 10px;
    border-radius: 10px;
    width: 100%;
}

/* FLOAT BUTTONS */
.donate-btn {
    position: fixed;
    left: 10px;
    bottom: 20px;
    background: red;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.contact-box {
    position: fixed;
    left: 10px;
    bottom: 70px;
    background: rgba(0,0,0,0.9);
    padding: 10px;
    border-radius: 10px;
    display: none;
}

.whatsapp {
    position: fixed;
    right: 15px;
    bottom: 20px;
    background: green;
    padding: 12px;
    border-radius: 50%;
    box-shadow: 0 0 15px lime;
    cursor: pointer;
}

/* DONATION PANEL */
.donation-panel {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: none;
    padding: 20px;
}

/* GREEN LINES */
.lines {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.line {
    position: absolute;
    width: 2px;
    height: 100%;
    background: rgba(0,255,0,0.2);
    animation: moveUp 5s linear infinite;
}

@keyframes moveUp {
    from { transform: translateY(100%); }
    to { transform: translateY(-100%); }
}
</style>
</head>

<body>

<div class="title">MARK TECH</div>

<canvas id="matrix"></canvas>

<div class="lines" id="lines"></div>

<div class="container">
    <h3>Barcode Generator</h3>

    <input type="text" id="text" placeholder="Enter text">

    <select id="format">
        <option value="CODE128">CODE128</option>
        <option value="EAN13">EAN13</option>
    </select>

    <button onclick="generate()">Generate</button>

    <svg id="barcode"></svg>
</div>

<!-- FLOAT -->
<div class="donate-btn" onclick="openDonate()">Donate</div>

<div class="contact-box" id="contactBox">
    📞 +254724356178<br>
    💬 0724356178<br>
    📧 marklinochieng@gmail.com
</div>

<div class="whatsapp" onclick="window.open('https://wa.me/254724356178')">💬</div>

<!-- DONATION PAGE -->
<div class="donation-panel" id="donatePanel">
    <h2>Support Mark Tech</h2>

    <p>KCB BANK<br>Paybill: 522522<br>Account: 1336980125</p>

    <p>FAMILY BANK<br>Paybill: 222111<br>Account: 085000113030</p>

    <button onclick="closeDonate()">Back</button>
</div>

<script>
// BARCODE
function generate() {
    let val = document.getElementById("text").value;
    let format = document.getElementById("format").value;

    if (!val) return alert("Enter value");

    JsBarcode("#barcode", val, {
        format: format,
        displayValue: true
    });
}

// DONATE
function openDonate() {
    document.getElementById("donatePanel").style.display = "block";
}
function closeDonate() {
    document.getElementById("donatePanel").style.display = "none";
}

// CONTACT TOGGLE
document.querySelector(".donate-btn").addEventListener("dblclick", () => {
    let box = document.getElementById("contactBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
});

// MATRIX (SLOWED)
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "010101";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        let text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height) drops[i] = 0;
        drops[i]++;
    }
}
setInterval(draw, 80);

// GREEN LINES
const linesContainer = document.getElementById("lines");
for (let i = 0; i < 30; i++) {
    let line = document.createElement("div");
    line.className = "line";
    line.style.left = Math.random() * 100 + "%";
    line.style.animationDuration = (3 + Math.random() * 5) + "s";
    linesContainer.appendChild(line);
}
</script>

</body>
</html>
